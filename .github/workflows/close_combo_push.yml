name: 收盘综合推送

on:
  schedule:
    - cron: "15 7 * * 1-5" # 北京时间 15:15 启动，目标 15:25~15:30 收到收盘综合推送
  workflow_dispatch:
    inputs:
      ai_review:
        description: "是否启用规则选股 AI 复核"
        required: false
        default: false
        type: boolean

concurrency:
  group: close-combo-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 恢复规则选股缓存
        uses: actions/cache@v4
        with:
          path: .cache/rule_screener_v2
          key: ${{ runner.os }}-rule-screener-v2-close-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-rule-screener-v2-close-${{ github.ref_name }}-
            ${{ runner.os }}-rule-screener-v2-${{ github.ref_name }}-

      - name: 生成并发送收盘综合推送
        env:
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_MODEL: ${{ vars.RULE_SCREENER_LITELLM_MODEL || 'openai/gpt-5-chat-latest' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-5-chat-latest' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEYS }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}
          REPORT_TYPE: full
          REPORT_DECISION_STYLE: ${{ vars.REPORT_DECISION_STYLE || secrets.REPORT_DECISION_STYLE || 'conservative' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'zh' }}
          NEWS_STRATEGY_PROFILE: short
          MARKET_REVIEW_ENABLED: true
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tushare,tencent,akshare_sina,efinance,akshare_em' }}
          RULE_SCREENER_MIN_TURNOVER_RATE: ${{ vars.RULE_SCREENER_MIN_TURNOVER_RATE || '3' }}
          RULE_SCREENER_MAX_BIAS_MA5_PCT: ${{ vars.RULE_SCREENER_MAX_BIAS_MA5_PCT || '9' }}
          RULE_SCREENER_SECTOR_TOP_N: ${{ vars.RULE_SCREENER_SECTOR_TOP_N || '5' }}
          RULE_SCREENER_DYNAMIC_MODE: "${{ vars.RULE_SCREENER_DYNAMIC_MODE || 'true' }}"
          RULE_SCREENER_ALLOW_EMPTY_REPORT: "${{ vars.RULE_SCREENER_ALLOW_EMPTY_REPORT || 'false' }}"
          RULE_SCREENER_MANUAL_REVIEW_LIMIT: "${{ vars.RULE_SCREENER_MANUAL_REVIEW_LIMIT || '20' }}"
          RULE_SCREENER_CACHE_DIR: .cache/rule_screener_v2/tushare
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.ai_review || 'false' }}" = "true" ]; then
            ARGS="$ARGS --ai-review"
          fi
          python scripts/run_close_combo_push.py $ARGS
